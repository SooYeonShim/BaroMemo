<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root { 
      --bg: #f7f7f5; 
      --bg2: #efefec;
      --bg3: #e5e5e1;
      --text: #1a1a1a;
      --text2: #555555;
      --border: #d5d5d0;
      --danger: #e05252;
      --accent2: #000000;
    }
    body.dark { 
      --bg: #111111; 
      --bg2: #1a1a1a; 
      --bg3: #222222;
      --text: #e8e8e8;
      --text2: #888888;
      --border: #333333;
      --accent2: #ffffff;
    }
    body { 
      margin: 0; 
      background: var(--bg); 
      overflow: hidden; 
      display: flex; 
      flex-direction: column;
      height: 100vh; 
      transition: background 0.2s; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Malgun Gothic", sans-serif;
    }

    #viewer-titlebar {
      height: 36px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 10px;
      gap: 4px;
      -webkit-app-region: drag;
      flex-shrink: 0;
      z-index: 100;
    }

    .ctrl-btn {
      width: 26px; height: 26px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      transition: background 0.15s;
      background: transparent;
      color: var(--text2);
      -webkit-app-region: no-drag;
      outline: none;
    }
    .ctrl-btn:hover { background: var(--bg3); color: var(--text); }
    .ctrl-btn.close:hover { background: var(--danger); color: #fff; }

    #img-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    #viewer-img { 
      cursor: grab; 
      transition: transform 0.1s ease-out; 
      user-select: none; 
      -webkit-user-drag: none; 
    }
    #viewer-img:active { cursor: grabbing; }
  </style>
</head>
<body>
  <div id="viewer-titlebar">
    <button class="ctrl-btn" id="viewer-max" title="최대화" aria-label="이미지 창 최대화">🗖</button>
    <button class="ctrl-btn close" id="viewer-close" title="닫기" aria-label="이미지 창 닫기">✕</button>
  </div>
  <div id="img-container">
    <img id="viewer-img" src="" alt=""/>
  </div>
  <script>
    const img = document.getElementById('viewer-img');
    const closeBtn = document.getElementById('viewer-close');
    const maxBtn = document.getElementById('viewer-max');
    let state = { scale: 1, x: 0, y: 0, isDragging: false, startX: 0, startY: 0 };

    window.api.onSetImage((src, theme) => {
      state.scale = 1;
      state.x = 0;
      state.y = 0;
      updateTransform();
      img.src = src;
      if (theme === 'dark') {
        document.body.classList.add('dark');
      } else {
        document.body.classList.remove('dark');
      }
    });

    function updateTransform() {
      img.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
    }

    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      state.scale *= delta;
      updateTransform();
    }, { passive: false });

    img.addEventListener('mousedown', (e) => {
      state.isDragging = true;
      state.startX = e.clientX - state.x;
      state.startY = e.clientY - state.y;
    });

    window.addEventListener('mousemove', (e) => {
      if (!state.isDragging) return;
      state.x = e.clientX - state.startX;
      state.y = e.clientY - state.startY;
      updateTransform();
    });

    window.addEventListener('mouseup', () => {
      state.isDragging = false;
    });

    closeBtn.addEventListener('click', () => {
      window.close();
    });

    maxBtn.addEventListener('click', () => {
      window.api.maximize();
    });

    window.api.onMaximizedChanged((isMax) => {
      maxBtn.textContent = isMax ? '🗗' : '🗖';
      maxBtn.title = isMax ? '이전 크기로' : '최대화';
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.close();
      }
    });
  </script>
</body>
</html>
